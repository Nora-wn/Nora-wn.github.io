<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记整理助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <button id="new-chat-btn" class="new-chat-btn">+ 新建整理</button>
            <div class="history-label">历史记录</div>
            <div id="history-list" class="history-list"></div>
        </aside>

        <main class="main-content">
            <header>
                <div class="api-config">
                    <label for="api-key">API KEY:</label>
                    <input type="password" id="api-key" placeholder="在此输入您的百炼 API Key">
                </div>
            </header>

            <div id="chat-window" class="chat-window">
                <div class="welcome-screen">
                    <h2>📝 学习笔记整理助手</h2>
                    <p>输入原始笔记开始整理，或输入指令进行修改</p>
                </div>
            </div>

            <div class="input-area">
                <div id="loading" class="loading hidden">Qwen 正在处理中...</div>
                <div class="input-container">
                    <textarea id="user-input" placeholder="输入内容..." rows="1"></textarea>
                    <div class="action-buttons">
                        <button id="clear-btn" class="btn-secondary">清空对话</button>
                        <button id="send-btn" class="btn-primary">发送</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
